services:
  mongodb:
    image: mongo:latest
    container_name: mongoose_project_db
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
    ports:
      - '27017:27017'
    volumes:
      - mongo_data_13:/data/db

volumes:
  mongoose_data_final:
